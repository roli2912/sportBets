name: CI

on:
  push:
  pull_request:

jobs:
  banned-strings:
    name: Banned strings (no profit-guarantee language)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check_banned_strings.sh

  web:
    name: Web — build + compliance footer on every route (§2.5)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sportbets_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sportbets_test
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies (workspace root)
        run: npm ci

      - name: Apply migrations (pages query the DB at request time)
        run: |
          for f in db/migrations/*.sql; do
            psql -h localhost -U postgres -d sportbets_test -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Build
        working-directory: apps/web
        run: npx next build

      - name: Start server and assert footer marker on every route
        working-directory: apps/web
        run: |
          npx next start -p 3000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 >/dev/null && break
            sleep 1
          done
          node scripts/check-compliance-footer.mjs

  workers:
    name: Workers — lint, migrations, tests (incl. picks append-only)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sportbets_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sportbets_test
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: workers
        run: uv sync --dev

      - name: Ruff lint
        working-directory: workers
        run: uv run ruff check .

      - name: Ruff format check
        working-directory: workers
        run: uv run ruff format --check .

      - name: Apply migrations (in filename order, applied once, never edited)
        run: |
          for f in db/migrations/*.sql; do
            echo "applying $f"
            psql -h localhost -U postgres -d sportbets_test -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Pytest (unit + DB integration: append-only picks, closing capture)
        working-directory: workers
        run: uv run pytest -v
